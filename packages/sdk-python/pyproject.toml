[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nirium"
version = "0.6.3"
description = "Official Python SDK for Nirium autonomous agents on Stellar (x402 + MPP)"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{name = "Nirium Protocol", email = "niriumprotocol@gmail.com"}]
keywords = ["nirium", "stellar", "soroban", "defi", "sdk", "agent", "autonomous", "treasury", "x402", "mpp", "agentic-payments", "usdc", "cetes", "etherfuse", "rwa"]
dependencies = [
    "aiohttp>=3.9.0",
    "websockets>=13.0",
    "stellar-sdk>=11.0.0",
]

[project.optional-dependencies]
frameworks = [
    "fastapi>=0.110.0",
    "flask>=3.0.0",
]
test = [
    "fastapi>=0.110.0",
    "flask[async]>=3.0.0",
    "httpx>=0.27.0",
    "pytest>=8.0.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[project.urls]
Homepage = "https://nirium.xyz"
Repository = "https://github.com/nirium-protocol/nirium-sdk"
Documentation = "https://nirium.xyz/docs"
"Bug Tracker" = "https://github.com/nirium-protocol/nirium-sdk/issues"
