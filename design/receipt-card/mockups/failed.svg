<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" width="480" height="560" role="img" aria-label="x402 receipt card, failed state">
  <title>x402 Receipt Card — Failed</title>
  <defs>
    <linearGradient id="failed-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07080C"/>
      <stop offset="100%" stop-color="#120A0E"/>
    </linearGradient>
    <radialGradient id="failed-glow" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="rgba(251,113,133,0.16)"/>
      <stop offset="100%" stop-color="rgba(251,113,133,0)"/>
    </radialGradient>
    <linearGradient id="failed-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <rect width="480" height="560" fill="url(#failed-bg)"/>
  <rect width="480" height="560" fill="url(#failed-glow)"/>

  <g transform="translate(24, 40)">
    <rect width="432" height="480" rx="20" ry="20" fill="url(#failed-glass)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="0.5" y="0.5" width="431" height="479" rx="19.5" ry="19.5" fill="none" stroke="rgba(255,255,255,0.04)"/>

    <g transform="translate(24, 24)">
      <circle cx="14" cy="14" r="14" fill="rgba(251,113,133,0.18)" stroke="rgba(255,255,255,0.10)"/>
      <line x1="10" y1="10" x2="18" y2="18" stroke="#FB7185" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="10" x2="10" y2="18" stroke="#FB7185" stroke-width="1.5" stroke-linecap="round"/>

      <text x="38" y="13" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F5F7FA">x402 Payment</text>
      <text x="38" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#FB7185">Failed · timeout after 30s</text>

      <!-- Failed pill -->
      <g transform="translate(312, 0)">
        <rect width="72" height="22" rx="11" ry="11" fill="rgba(251,113,133,0.14)"/>
        <circle cx="11" cy="11" r="3" fill="#FB7185"/>
        <text x="20" y="15" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FB7185" letter-spacing="0.02em">Failed</text>
      </g>
    </g>

    <line x1="24" y1="78" x2="408" y2="78" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <g transform="translate(24, 96)" opacity="0.6">
      <text font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#A8B0BF" letter-spacing="-0.6" text-decoration="line-through">12.500000<tspan font-size="18" font-weight="500" fill="#6C7588" letter-spacing="-0.18" dx="6">USDC</tspan></text>
      <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#FB7185">Not settled — funds returned to source</text>
    </g>

    <g transform="translate(24, 168)">
      <rect width="384" height="180" rx="12" ry="12" fill="rgba(251,113,133,0.04)" stroke="rgba(251,113,133,0.16)" stroke-width="1"/>

      <g transform="translate(16, 14)">
        <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6C7588" letter-spacing="0.88">TX HASH</text>
        <g transform="translate(0, 16)">
          <text font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#A8B0BF">n/a (timed out)</text>
        </g>
      </g>

      <g transform="translate(16, 64)">
        <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6C7588" letter-spacing="0.88">NETWORK</text>
        <text y="16" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#F5F7FA">Stellar Testnet</text>
      </g>

      <g transform="translate(16, 102)">
        <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6C7588" letter-spacing="0.88">ERROR CODE</text>
        <text y="16" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#FB7185">x402_timeout_exceeded</text>
      </g>
    </g>

    <!-- Actions: Retry + Details -->
    <g transform="translate(24, 380)">
      <rect width="180" height="44" rx="10" ry="10" fill="#FB7185"/>
      <text x="90" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#07080C">Retry Payment</text>

      <g transform="translate(188, 0)">
        <rect width="196" height="44" rx="10" ry="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="98" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#F5F7FA">View Error Details</text>
      </g>
    </g>
  </g>
</svg>
