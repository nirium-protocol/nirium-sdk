<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" width="480" height="560" role="img" aria-label="x402 receipt card, pending state">
  <title>x402 Receipt Card — Pending</title>
  <defs>
    <linearGradient id="pending-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07080C"/>
      <stop offset="100%" stop-color="#0E1018"/>
    </linearGradient>
    <radialGradient id="pending-glow" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="rgba(91,108,255,0.32)"/>
      <stop offset="100%" stop-color="rgba(91,108,255,0)"/>
    </radialGradient>
    <linearGradient id="pending-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="pending-shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(251,191,36,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <rect width="480" height="560" fill="url(#pending-bg)"/>
  <rect width="480" height="560" fill="url(#pending-glow)"/>

  <g transform="translate(24, 40)">
    <rect width="432" height="480" rx="20" ry="20" fill="url(#pending-glass)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="0.5" y="0.5" width="431" height="479" rx="19.5" ry="19.5" fill="none" stroke="rgba(255,255,255,0.04)"/>

    <!-- Header -->
    <g transform="translate(24, 24)">
      <circle cx="14" cy="14" r="14" fill="rgba(91,108,255,0.18)" stroke="rgba(255,255,255,0.10)"/>
      <circle cx="14" cy="14" r="5" fill="none" stroke="#7C8CFF" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="1.5" fill="#7C8CFF"/>

      <text x="38" y="13" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F5F7FA">x402 Payment</text>
      <text x="38" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6C7588">Pending · awaiting confirmation</text>

      <!-- Pending pill -->
      <g transform="translate(296, 0)">
        <rect width="88" height="22" rx="11" ry="11" fill="rgba(251,191,36,0.14)"/>
        <!-- Spinner dot (animated via SMIL or static for export) -->
        <g transform="translate(11, 11)">
          <circle r="3" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.3"/>
          <path d="M 0,-3 A 3,3 0 0 1 2.6,1.5" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <text x="22" y="15" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FBBF24" letter-spacing="0.02em">Pending…</text>
      </g>
    </g>

    <line x1="24" y1="78" x2="408" y2="78" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Amount (slightly muted) -->
    <g transform="translate(24, 96)" opacity="0.78">
      <text font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="600" fill="#F5F7FA" letter-spacing="-0.6">12.500000<tspan font-size="18" font-weight="500" fill="#A8B0BF" letter-spacing="-0.18" dx="6">USDC</tspan></text>
      <text y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6C7588">≈ $12.50 USD</text>
    </g>

    <!-- Shimmer sweep across metadata -->
    <rect x="24" y="168" width="384" height="180" fill="url(#pending-shimmer)" opacity="0.5"/>

    <g transform="translate(24, 168)">
      <rect width="384" height="180" rx="12" ry="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

      <g transform="translate(16, 14)">
        <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6C7588" letter-spacing="0.88">TX HASH</text>
        <g transform="translate(0, 16)">
          <text font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#A8B0BF">awaiting…</text>
          <g transform="translate(320, -8)">
            <rect width="28" height="28" rx="8" ry="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)"/>
          </g>
        </g>
      </g>

      <g transform="translate(16, 64)">
        <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6C7588" letter-spacing="0.88">NETWORK</text>
        <text y="16" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#F5F7FA">Stellar Testnet</text>
      </g>

      <g transform="translate(16, 102)">
        <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6C7588" letter-spacing="0.88">IPFS CID</text>
        <g transform="translate(0, 16)">
          <text font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#A8B0BF">queueing…</text>
          <g transform="translate(320, -8)">
            <rect width="28" height="28" rx="8" ry="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Actions (disabled) -->
    <g transform="translate(24, 380)" opacity="0.55">
      <rect width="248" height="44" rx="10" ry="10" fill="#5B6CFF"/>
      <text x="124" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#07080C">View on Stellar Expert</text>

      <g transform="translate(256, 0)">
        <rect width="128" height="44" rx="10" ry="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
        <text x="64" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#F5F7FA">Share</text>
      </g>
    </g>
  </g>
</svg>
